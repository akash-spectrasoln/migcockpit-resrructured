{% extends 'base/admin_nav.html' %}

{% block title %}Create User{% endblock %}

{% block extra_styles %}
<style>
    .container {
        padding: 0.75rem 2rem;
    }

    .content-wrapper {
        margin-top: 0.5rem;
    }

    .form-header {
        margin-bottom: 1rem;
        border-bottom: 2px solid #e2e8f0;
        padding-bottom: 1rem;
    }

    .form-header h1 {
        font-size: 1.5rem;
        color: #2d3748;
        margin-bottom: 0.25rem;
    }

    .form-header p {
        color: #718096;
        font-size: 0.85rem;
    }

    .user-form {
        max-width: 100%;
    }

    .form-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 0.75rem;
        margin-bottom: 0.75rem;
    }

    .form-row-2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
        margin-bottom: 0.75rem;
    }

    .form-group {
        display: flex;
        flex-direction: column;
    }

    .form-group.full-width {
        grid-column: 1 / -1;
    }

    .form-group label {
        font-weight: 600;
        color: #2d3748;
        margin-bottom: 0.35rem;
        font-size: 0.8rem;
        display: flex;
        align-items: center;
    }

    .form-group label .required {
        color: #e53e3e;
        margin-left: 0.25rem;
    }

    .form-group input,
    .form-group select {
        padding: 0.35rem 0.5rem;
        border: 1.5px solid #cbd5e0;
        border-radius: 6px;
        font-size: 0.8rem;
        transition: all 0.2s ease;
        background-color: white;
    }

    .form-group input:focus,
    .form-group select:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .form-group input::placeholder {
        color: #a0aec0;
    }

    .form-actions {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
        margin-top: 1rem;
        padding-top: 0.75rem;
        border-top: 2px solid #e2e8f0;
    }

    .btn {
        padding: 0.4rem 1.5rem;
        border: none;
        border-radius: 6px;
        font-weight: 600;
        font-size: 0.8rem;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn-primary {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
    }

    .btn-secondary {
        background-color: #e2e8f0;
        color: #2d3748;
    }

    .btn-secondary:hover {
        background-color: #cbd5e0;
    }

    .alert {
        padding: 0.6rem 0.85rem;
        border-radius: 6px;
        margin-bottom: 1rem;
        font-size: 0.8rem;
    }

    .alert-error {
        background-color: #fed7d7;
        color: #c53030;
        border: 1px solid #fc8181;
    }

    .alert-success {
        background-color: #c6f6d5;
        color: #22543d;
        border: 1px solid #68d391;
    }

    .checkbox-wrapper {
        display: flex;
        align-items: center;
        margin-top: 0.5rem;
    }

    .checkbox-wrapper input[type="checkbox"] {
        width: 18px;
        height: 18px;
        margin-right: 0.5rem;
        cursor: pointer;
    }

    .checkbox-wrapper label {
        margin-bottom: 0;
        cursor: pointer;
        font-weight: 500;
    }

    @media (max-width: 1024px) {
        .form-row {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 768px) {
        .form-row,
        .form-row-2 {
            grid-template-columns: 1fr;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="content-wrapper">
    <div class="form-header">
        <h1>Create New User</h1>
        <p>Fill in the information below to register a new user</p>
    </div>

    <div id="alertContainer"></div>

    <form class="user-form" id="userForm">
        <!-- Row 1: Basic Info -->
        <div class="form-row">
            <div class="form-group">
                <label for="email">Email<span class="required">*</span></label>
                <input type="email" id="email" name="email" placeholder="Enter email address" required>
            </div>
            <div class="form-group">
                <label for="first_name">First Name<span class="required">*</span></label>
                <input type="text" id="first_name" name="first_name" placeholder="Enter first name" required>
            </div>
            <div class="form-group">
                <label for="last_name">Last Name<span class="required">*</span></label>
                <input type="text" id="last_name" name="last_name" placeholder="Enter last name" required>
            </div>
        </div>

        <!-- Row 2: Customer -->
        <div class="form-row">
            <div class="form-group">
                <label for="customer">Customer<span class="required">*</span></label>
                <select id="customer" name="customer" required>
                    <option value="">Select a customer</option>
                </select>
            </div>
        </div>

        <!-- Row 3: Status -->
        <div class="form-row">
            <div class="form-group">
                <label>Status</label>
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="is_active" name="is_active" checked>
                    <label for="is_active">Active</label>
                </div>
            </div>
        </div>

        <!-- Form Actions -->
        <div class="form-actions">
            <button type="button" class="btn btn-secondary" onclick="window.history.back()">Cancel</button>
            <button type="submit" class="btn btn-primary">Create User</button>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
    // Fetch customers on page load
    document.addEventListener('DOMContentLoaded', function() {
        fetchCustomers();
    });

    async function fetchCustomers() {
        try {
            const response = await fetch('/api-admin/api-customerslist/');
            const data = await response.json();
            
            const customerSelect = document.getElementById('customer');
            data.forEach(customer => {
                const option = document.createElement('option');
                option.value = customer.cust_id;
                option.textContent = `${customer.cust_id} - ${customer.name}`;
                customerSelect.appendChild(option);
            });
        } catch (error) {
            console.error('Error fetching customers:', error);
            showAlert('Failed to load customers. Please refresh the page.', 'error');
        }
    }

    document.getElementById('userForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = {
            email: document.getElementById('email').value,
            first_name: document.getElementById('first_name').value,
            last_name: document.getElementById('last_name').value,
            cust_id: document.getElementById('customer').value,
            is_active: document.getElementById('is_active').checked
        };

        try {
            const response = await fetch('/api-admin/api-create-user/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(formData)
            });

            const data = await response.json();

            if (response.ok) {
                showAlert(data.message || 'User created successfully!', 'success');
                // Reset form
                document.getElementById('userForm').reset();
                // Optionally redirect after a delay
                setTimeout(() => {
                    window.location.href = '/api-admin/userslist/';
                }, 2000);
            } else {
                const errorMessage = formatErrors(data);
                showAlert(errorMessage, 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showAlert('An error occurred while creating the user. Please try again.', 'error');
        }
    });

    function formatErrors(data) {
        if (typeof data === 'string') {
            return data;
        }
        if (data.error) {
            return data.error;
        }
        if (data.errors) {
            return Object.entries(data.errors)
                .map(([field, errors]) => `${field}: ${Array.isArray(errors) ? errors.join(', ') : errors}`)
                .join('\n');
        }
        return Object.entries(data)
            .map(([field, errors]) => `${field}: ${Array.isArray(errors) ? errors.join(', ') : errors}`)
            .join('\n');
    }

    function showAlert(message, type) {
        const alertContainer = document.getElementById('alertContainer');
        const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
        
        alertContainer.innerHTML = `
            <div class="alert ${alertClass}">
                ${message}
            </div>
        `;

        // Auto-hide alert after 5 seconds
        setTimeout(() => {
            alertContainer.innerHTML = '';
        }, 5000);
    }
</script>
{% endblock %}
