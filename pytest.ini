[pytest]
# Main pytest config is in pyproject.toml [tool.pytest.ini_options]
# This file exists so pytest finds the project root correctly on Windows.
# Markers are defined in pyproject.toml.
testpaths = tests
markers =
    unit: No database, no network — runs in milliseconds
    integration: Requires a real database — auto-skips if unavailable
    db: Requires Django settings + real DB (used by cache tests)
    slow: Takes more than 5 seconds
