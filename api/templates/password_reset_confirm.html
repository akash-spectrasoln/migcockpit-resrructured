<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - Data Migration API</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }

        .reset-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .reset-header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .reset-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .reset-form {
            padding: 40px 30px;
        }

        .info-message {
            background: #e3f2fd;
            border-left: 4px solid #2196F3;
            padding: 15px;
            margin-bottom: 24px;
            border-radius: 4px;
            font-size: 14px;
            color: #1976D2;
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 45px 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group input::placeholder {
            color: #999;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 42px;
            cursor: pointer;
            color: #666;
            user-select: none;
            padding: 5px;
        }

        .password-toggle:hover {
            color: #667eea;
        }

        .password-strength {
            margin-top: 8px;
            font-size: 12px;
        }

        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .strength-bar-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-bar-fill.weak {
            width: 33%;
            background-color: #f44336;
        }

        .strength-bar-fill.medium {
            width: 66%;
            background-color: #ff9800;
        }

        .strength-bar-fill.strong {
            width: 100%;
            background-color: #4caf50;
        }

        .strength-text {
            color: #666;
        }

        .reset-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .reset-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .reset-button:active {
            transform: translateY(0);
        }

        .reset-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .back-to-login a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-to-login a:hover {
            color: #764ba2;
        }

        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-left: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            display: none;
        }

        button.loading .loading-text {
            display: inline;
        }

        button.loading .default-text {
            display: none;
        }

        .password-requirements {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 13px;
        }

        .password-requirements ul {
            margin: 8px 0 0 20px;
            color: #666;
        }

        .password-requirements li {
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-header">
            <h1>Set New Password</h1>
            <p>Enter your new password below</p>
        </div>

        <div class="reset-form">
            <div id="alertMessage" class="alert"></div>

            <form id="resetForm">
                {% csrf_token %}
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        name="new_password" 
                        placeholder="Enter your new password" 
                        required
                        autocomplete="new-password"
                    >
                    <span class="password-toggle" onclick="togglePassword('newPassword')">👁️</span>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-bar-fill" id="strengthBar"></div>
                        </div>
                        <div class="strength-text" id="strengthText"></div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirm_password" 
                        placeholder="Confirm your new password" 
                        required
                        autocomplete="new-password"
                    >
                    <span class="password-toggle" onclick="togglePassword('confirmPassword')">👁️</span>
                </div>

                <div class="password-requirements">
                    <strong>Password Requirements:</strong>
                    <ul>
                        <li>At least 8 characters long</li>
                        <li>Contains uppercase and lowercase letters</li>
                        <li>Contains at least one number</li>
                        <li>Contains at least one special character</li>
                    </ul>
                </div>

                <button type="submit" class="reset-button" id="submitButton">
                    <span class="default-text">Reset Password</span>
                    <span class="loading-text">Resetting<span class="spinner"></span></span>
                </button>
            </form>

            <div class="back-to-login">
                <a href="{% url 'login_page' %}">← Back to Login</a>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const submitButton = document.getElementById('submitButton');
        const alertMessage = document.getElementById('alertMessage');
        const newPasswordInput = document.getElementById('newPassword');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const strengthBar = document.getElementById('strengthBar');
        const strengthText = document.getElementById('strengthText');

        // Get uid and token from URL path
        const urlPath = window.location.pathname;
        const pathParts = urlPath.split('/').filter(part => part !== '');
        
        // Find the reset-password-confirm part and get the next two parts
        const resetIndex = pathParts.indexOf('reset-password-confirm');
        let uid = null;
        let token = null;
        
        if (resetIndex !== -1 && pathParts.length > resetIndex + 2) {
            uid = pathParts[resetIndex + 1];
            token = pathParts[resetIndex + 2];
        }

        // Check if uid and token are present and valid
        if (!uid || !token || uid === 'reset-password-confirm' || token === 'reset-password-confirm' || uid.length < 10 || token.length < 10) {
            showAlert('Invalid password reset link. Please request a new one.', 'error');
            submitButton.disabled = true;
        } else {
            // Valid link, ensure button is enabled
            submitButton.disabled = false;
        }

        // Debug logging
        console.log('URL path:', urlPath);
        console.log('Path parts:', pathParts);
        console.log('Reset index:', resetIndex);
        console.log('UID:', uid);
        console.log('Token:', token);
        console.log('Button disabled:', submitButton.disabled);

        function showAlert(message, type) {
            alertMessage.textContent = message;
            alertMessage.className = `alert alert-${type} show`;
            
            if (type === 'success') {
                setTimeout(() => {
                    window.location.href = "{% url 'login_page' %}";
                }, 2000);
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        function checkPasswordStrength(password) {
            let strength = 0;
            
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/\d/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            strengthBar.className = 'strength-bar-fill';
            
            if (strength < 2) {
                strengthBar.classList.add('weak');
                strengthText.textContent = 'Weak password';
                strengthText.style.color = '#f44336';
            } else if (strength < 4) {
                strengthBar.classList.add('medium');
                strengthText.textContent = 'Medium strength';
                strengthText.style.color = '#ff9800';
            } else {
                strengthBar.classList.add('strong');
                strengthText.textContent = 'Strong password';
                strengthText.style.color = '#4caf50';
            }
        }

        newPasswordInput.addEventListener('input', (e) => {
            checkPasswordStrength(e.target.value);
            alertMessage.className = 'alert';
        });

        confirmPasswordInput.addEventListener('input', () => {
            alertMessage.className = 'alert';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = newPasswordInput.value;
            const confirmPassword = confirmPasswordInput.value;

            // Validation
            if (!newPassword || !confirmPassword) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            if (newPassword.length < 8) {
                showAlert('Password must be at least 8 characters long', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            // Disable button and show loading
            submitButton.disabled = true;
            submitButton.classList.add('loading');
            alertMessage.className = 'alert';

            try {
                const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
                
                const response = await fetch('/api/api-reset-password-confirm/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken
                    },
                    body: JSON.stringify({
                        uid: uid,
                        token: token,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(data.message || 'Password has been reset successfully. Redirecting to login...', 'success');
                } else {
                    showAlert(data.error || 'An error occurred. Please try again or request a new reset link.', 'error');
                    submitButton.disabled = false;
                    submitButton.classList.remove('loading');
                }
            } catch (error) {
                showAlert('Network error. Please check your connection and try again.', 'error');
                console.error('Error:', error);
                submitButton.disabled = false;
                submitButton.classList.remove('loading');
            }
        });
    </script>
</body>
</html>
