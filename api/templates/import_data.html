<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>Import Data from HANA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5" style="max-width: 500px;">
    <h2 class="mb-4">Import Data from HANA</h2>
    <form id="importDataForm">
        <div class="mb-3">
            <label for="user_id" class="form-label">User ID</label>
            <input type="text" class="form-control" id="user_id" name="user_id" required>
        </div>
        <button type="submit" class="btn btn-primary">Import Data</button>
    </form>
    <div id="result" class="mt-4"></div>
</div>

<script>
document.getElementById('importDataForm').addEventListener('submit', async function(event) {
    event.preventDefault();
    const userId = document.getElementById('user_id').value;
    const resultDiv = document.getElementById('result');
    resultDiv.innerHTML = '';

    try {
        // Get CSRF token
        const csrfToken = document.querySelector('[name=csrf-token]').getAttribute('content');
        
        // Send user_id in request body for POST request
        const response = await fetch("{% url 'import-data-from-hana-api' %}", {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
            },
            body: JSON.stringify({ user_id: userId })
        });

        if (!response.ok) {
            const errorData = await response.json();
            resultDiv.innerHTML = `<div class="alert alert-danger">Error: ${errorData.message || response.statusText}</div>`;
            return;
        }
        const data = await response.json();
        resultDiv.innerHTML = `<div class="alert alert-success">${data.message || 'Import successful.'}</div>`;
    } catch (error) {
        resultDiv.innerHTML = `<div class="alert alert-danger">An error occurred: ${error}</div>`;
    }
});
</script>
</body>
</html>
